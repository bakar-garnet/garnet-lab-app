name: Garnet Deep Monitor

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  garnet-deep-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Garnet Monitor Init
        uses: garnet-org/action@v2
        with:
          api_token: ${{ secrets.GARNET_API_TOKEN }}

      - name: Install Node dependencies (with postinstall hooks)
        run: |
          if [ -f package.json ]; then
            npm ci || npm install
          fi

      - name: Run known Node build + lint flows
        run: |
          npm run build --if-present
          npm run prepare --if-present
          npm run lint --if-present
          npm run format --if-present
          npm test --if-present

      - name: Install Python deps
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          if [ -f pyproject.toml ]; then
            pip install .
          fi

      - name: Run Python flows
        run: |
          pytest || true
          python -m unittest discover || true

      - name: Run cargo tests
        run: |
          if [ -f Cargo.toml ]; then
            cargo check || true
            cargo test || true
          fi

      - name: Run make if present
        run: |
          if [ -f Makefile ]; then
            make
          fi
